services:
  backend:
    build:
      context: .
    container_name: bf-backend
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/bfnavigator
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - DB_CLIENT_ID=${DB_CLIENT_ID}
      - DB_CLIENT_SECRET=${DB_CLIENT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../bf-navigator-web
    container_name: bf-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    container_name: bf-postgres
    environment:
      POSTGRES_DB: bfnavigator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

volumes:
  db-data:
